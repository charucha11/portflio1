<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Figma Project</title>
<style>
body {
 font-family: Arial;
 text-align: center;
 padding: 50px;
}

img {
 width: 300px;
 border-radius: 15px;
}

/* ปรับแต่งปุ่มและลิงก์ให้สวยงามและเป็นสไตล์เดียวกัน */
button, .figma-link {
 margin-top: 20px;
 padding: 10px 20px;
 border: none;
 background: #ff4da6;
 color: white;
  border-radius: 10px;
 cursor: pointer;
 font-size: 16px;
  text-decoration: none; /* ลบเส้นใต้ของลิงก์ออก */
  display: inline-block; /* ให้จัดเรียงแนวนอนได้ */
  margin: 10px 5px; /* เว้นระยะห่างระหว่างปุ่ม */
  transition: 0.3s;
}

/* เพิ่มเอฟเฟกต์ตอนเอาเมาส์ชี้ */
button:hover, .figma-link:hover {
  background: #e60073;
  transform: scale(1.05);
}
</style>
</head>

<body>

<h1>Figma Project</h1>

<img src="figma.jpg">

<p>การได้ใช้ Figma ในการออกแบบ</p>
